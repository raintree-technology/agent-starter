name: Drift Check

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".npmrc"
      - ".nvmrc"
      - "biome*.json*"
      - "package.json"
      - "package-lock.json"
      - "renovate.json"
      - "site/biome*.json*"
      - "site/package.json"
      - "site/bun.lock"
      - "site/tsconfig.json"
      - "site/tsconfig.base.json"

permissions:
  contents: read

jobs:
  drift:
    name: Standard drift
    uses: raintree-technology/.github/.github/workflows/drift-check.yml@326f815e920df16bafa8234b236e2de4b78ee660
