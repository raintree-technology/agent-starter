name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  root:
    name: Root package
    uses: raintree-technology/.github/.github/workflows/ci.yml@326f815e920df16bafa8234b236e2de4b78ee660
    with:
      package-manager: npm
      node-version: "22"
      working-directory: "."
    secrets: inherit

  site:
    name: Marketing site
    uses: raintree-technology/.github/.github/workflows/ci.yml@326f815e920df16bafa8234b236e2de4b78ee660
    with:
      package-manager: bun
      bun-version: "1.3.11"
      working-directory: site
    secrets: inherit
