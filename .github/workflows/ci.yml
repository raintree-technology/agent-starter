name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  root:
    name: Root package
    uses: raintree-technology/.github/.github/workflows/ci.yml@87c460a4be6d320112ccd82e094c4137c6444d81
    with:
      package-manager: npm
      node-version: "22"
      working-directory: "."
      standard-ref: 87c460a4be6d320112ccd82e094c4137c6444d81

  site:
    name: Marketing site
    uses: raintree-technology/.github/.github/workflows/ci.yml@87c460a4be6d320112ccd82e094c4137c6444d81
    with:
      package-manager: bun
      bun-version: "1.3.11"
      working-directory: site
      standard-ref: 87c460a4be6d320112ccd82e094c4137c6444d81
