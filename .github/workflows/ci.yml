name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  root:
    name: Root package
    uses: raintree-technology/.github/.github/workflows/ci.yml@3256afba6d5c060f8b00f1bbf96887d253b0e9e1
    with:
      package-manager: npm
      node-version: "22"
      working-directory: "."
      standard-ref: 3256afba6d5c060f8b00f1bbf96887d253b0e9e1

  site:
    name: Marketing site
    uses: raintree-technology/.github/.github/workflows/ci.yml@3256afba6d5c060f8b00f1bbf96887d253b0e9e1
    with:
      package-manager: bun
      bun-version: "1.3.11"
      working-directory: site
      standard-ref: 3256afba6d5c060f8b00f1bbf96887d253b0e9e1
